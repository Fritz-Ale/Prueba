<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Baby Helena Shop</title><link rel="stylesheet" href="../css/styles.css"></head><body><div class="admin-shell"><aside class="admin-side"><h2>Baby Helena Admin</h2><p>Panel de control</p><a class="btn ghost" href="../index.html">Ver tienda</a><button class="btn pink" id="logoutBtn">Cerrar sesión</button></aside><main class="admin-main"><h1>Panel administrador</h1><div class="mini-grid" id="stats"></div><section class="admin-card"><h2>Agregar producto</h2><form id="productForm"><div class="field"><label>Nombre</label><input id="pName" required></div><div class="field"><label>Categoría</label><input id="pCat" required></div><div class="field"><label>Precio</label><input id="pPrice" type="number" required></div><div class="field"><label>Emoji/imagen temporal</label><input id="pEmoji" placeholder="👜"></div><button class="btn pink">Agregar</button></form></section><section><h2>Productos</h2><div id="productList"></div></section><section class="admin-card"><h2>Crear / actualizar pedido</h2><form id="orderForm"><div class="field"><label>Código</label><input id="oCode" required></div><div class="field"><label>Correo cliente</label><input id="oEmail" type="email" required></div><div class="field"><label>Estado</label><input id="oStatus" placeholder="Enviado por Starken" required></div><div class="field"><label>Seguimiento</label><input id="oTrack" required></div><div class="field"><label>Progreso 0 a 4</label><input id="oProgress" type="number" min="0" max="4" value="2"></div><button class="btn pink">Guardar pedido</button></form></section><section><h2>Pedidos</h2><div id="orderList"></div></section></main></div><script src="../js/products.js"></script><script src="../js/admin.js"></script></body></html>
