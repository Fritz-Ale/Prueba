<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Baby Helena Shop</title><link rel="stylesheet" href="../css/styles.css"></head><body><div class="announce">Panel administrador Baby Helena Shop</div><main class="container section panel"><aside class="admin-menu"><a href="../index.html">Ver tienda</a><a href="#productos">Productos</a><a href="#pedidos">Pedidos</a><button class="btn secondary" id="logout">Cerrar sesión</button></aside><section><h1>Panel de control</h1><div class="card" id="productos"><h2>Agregar producto</h2><form class="form" id="productForm"><input name="name" placeholder="Nombre" required><input name="cat" placeholder="Categoría" required><input name="price" type="number" placeholder="Precio" required><input name="emoji" placeholder="Emoji o icono"><input name="tag" placeholder="Etiqueta"><button class="btn primary">Guardar producto</button></form></div><h2>Productos</h2><div id="adminProducts"></div><div class="card" id="pedidos" style="margin-top:22px"><h2>Crear/actualizar pedido</h2><form class="form" id="orderForm"><input name="code" placeholder="Código pedido" required><input name="email" type="email" placeholder="Correo cliente" required><input name="status" placeholder="Estado" required><input name="carrier" placeholder="Transporte" required><input name="tracking" placeholder="N° seguimiento" required><button class="btn primary">Guardar pedido</button></form></div><h2>Pedidos</h2><div id="adminOrders"></div></section></main><script src="../js/admin.js"></script></body></html>
